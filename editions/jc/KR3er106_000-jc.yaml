body:
  text: 內傷門虛損勞瘵用浴池水待人浴書時取一澄清去腳用清者六碗煮紅棗二兩煮至三碗連湯棗服早午晚三次每日不脫其病即愈又方豬腰子二個童便二盞好酒一盞新罐盛之泥封炭火溫養自戍至子時五更初燉滾取開飲酒食腰半月取效一月全愈又方雞蛋七個入童便內浸七日一換取出再用豬肚洗淨將蛋去殼入內縫好加白酒入砂鍋內煮爛食之如此數次即愈回生膏治血虛火旺人乳男用女胎女用男胎藕汁白灑帶頭漿白蜜白童便臨時取用各等分煎膏滴水不散空心服之圓眼湯送下病重者多吃又方大補虛損牛乳十斤桂圓十斤二味煎膏酒服又方鳥骨童雄雞一雙碗鋒去毛雜不下水忌鐵器肚內入建蓮用砂鍋將好酒煎爛雞頭放在鍋外隨意食之吐血不止用荊川竹紙燒灰冷水和服神效或取藕汁同好墨汁沖和服又方乾荷葉頂廿四個燒存性蒲黃炒黑省鬱金各五錢白絲線灰一錢共末茅根汁和湯下又方梨汁白蘿蔔汁人乳牛童便十大功勞汁又名老鼠刺江南處處有之以上各一碗用黑料豆二升同煮乾曬燥每早三錢白水下吐血後調理方白元米一升炒蓮子一斤去心童便浸一宿曬乾如此七次為末加蜜一斤入罐重湯煮三炷香取出任意服內損吐血飛羅面略炒以京墨汁或藕節汁調服二錢久嗽不止紫苑冬花各一錢百部五錢共為末用姜三片烏梅一個煎湯調下三錢日二服新久咳嗽無內熱見血者生薑自然汁一杓生蜜二匙同放碗內重湯煮一滾服又方胡桃肉三枚生薑三片臥時嚼服即飲湯二三口又嚼桃姜如此數服即靜臥必愈咳嗽痰壅梨汁一鍾薑汁蜜各半鍾薄荷末五錢和勻重湯煮十飲沸任意食之久咳不止人乳半鍾甜梨汁小半鍾和入碗器內滾水燉開取起空心服老年痰火皆效久嗽乳酥四兩白蜜四兩生薑四兩竹刀搗碎取汁核桃七個杏仁七粒去皮尖漫火熬黑色每日清晨服數匙又方款冬花蕊五錢鵝管石五錢煆陳皮二錢五分冬月加肉桂一錢五分老人虛人加人參五錢忌鐵器為末分為七服每晚一服作三次入蘆管內口噙蘆管近咽喉用力一吸將溫水一口送下不可多吃忌油膩半鹽肺癰夜合花樹第二層皮俗名絨樹六七月間開紅花細簇如刮絨花煎湯時進飲之或多年陳芥菜滷飲一杯神功或虎耳草汁沖白酒漿露一宿空心服哮喘方白雞冠花經霜打者焙為末酒下三錢數次即俞哮喘神驗鴿糞一撮將瓦燒紅鴿糞在上自然成灰研細好酒下立止又方雞子一枚頂開一孔入人中白末三釐調勻紙糊煨熟食之氣喘咳逆真紫蘇子入水研濾汁同粳米煮粥食男婦虛勞腰腿疼痛咳嗽吐痰不發熱者九月經霜桑葉陰乾一斤紅棗去皮核一斤好酒五斤同浸缸內重湯文武火煮二炷得空心服三小杯寒熱肢體倦痛者入九月青蒿成實時採之去枝梗以童便浸三曬乾為末每服二錢烏梅一個煎湯下傳屍勞病背脊內必熱有蟲取鴿糞三五合炒極熱布包後尾閭擦背脊上至頭項骨又後頸項擦背脊下至尾閭如此上下數十遍冷則易之日擦十餘次夜擦五六次三日內外常擦其蟲心死服藥有效虛勞傷腎夢中泄精用韭子二兩微炒為末食前溫酒服二錢
