body:
  text: 村居急救卷五幼科初生小兒不尿乃胎熱也取大蔥白切四片取乳汁半盞同煎片時分作四服即通不飲乳者服之飲乳若臍傍有青黑色及撮口者不治小兒初生大小便不通以致腹脹欲死急令人以湯漱口吸咂兒前後心並手足心臍下七處凡五七次以皮紅赤色為度須臾即通小兒生下不出聲者即死可看上齶有泡急以銀簪挑破絲棉試去血勿令入喉即活又方切不可斷臍以綿衣包兒用大紙燃燒臍得兒氣轉回方可斷臍小兒生下偏身無皮速取白米粉乾樸候皮生乃止急驚看食指上大指傍邊第二指也男看左女看右近虎口第二節有青紫筋紋用針挑斷擠出惡血即愈忌飲食一復時小兒夜啼燈草一大圍燒灰存性仍用燈草湯調下或塗兒上齶亦妙又方雞屎塗兒臍中男用雌女用雄急慢驚風秒砂一錢輕粉七分直姜蠶七個去頭足焙全蠍三個洗去泥並鉤炙共末人乳調服兒小分三次服小兒夜夜遺尿雞肫一具去內物洗淨焙乾存性豬尿胞一個燒灰存性二味為末作二三次空心溫酒調服男用雄女用雌小兒鎖口並口瘡舌上瘡取桑樹汁塗兒口中小兒口舌生瘡乳食湯藥皆不能服下者以生明礬為末以難蛋清同吊麈灰調數腳心布包即愈小兒好吃泥土生米布物綠礬土炒紅棗去皮核飯上蒸熟和勻濕紙包煨研末每五分酒下小兒健脾丸山查肉一斤炒焦白朮二兩土炒為末爛蜜丸彈子大每日服二三丸米湯化下小兒瘦疳五穀蟲清水洗淨瓦上焙脆為末四兩乾蟾一個即暇蟆炙脆麝香少許以粳米粉糊為小丸米飲下又方石決明磨去粗皮煆一兩使君子肉焙乾三錢硃砂三錢共為細末每用一錢以健豬肝二兩一塊破開入藥在肉用線紮好米泔水煮熟連湯與食之半月愈小兒癆方陳酒童便各一杯先煎數十滾再加白蜜人乳各一鍾共煎成膏服重者多服小兒受寒吐瀉不早治則成慢驚丁香陳皮各數分煎服立愈小兒臍腫荊芥煎湯洗淨以煨蔥皮刮薄貼之即消小兒臍瘡久不愈馬齒莧燒灰敷之小兒口瘡不能吮乳蜜陀僧為末醋調塗足心瘡愈洗之小兒口疳甘蔗皮燒灰研末搽之又溺桶中垢用火煆過一錢銅綠三分麝香一分冰片少許細末吹之小兒軟癤大芋頭一個搗如泥敷之小兒丹毒入腹則死綠豆五錢大黃二錢為末用生薄荷汁入蜜調塗又芒硝一兩滾水一盞化水頻試患上又馬齒莧搗塗之又藍靛搗敷之小兒月內乖瘡滿頭及渾身脫皮者多年尿缸內紅色磚焙乾為末或香油麻油俱可調搽小兒瘰癧脂麻連翹等分為末頻食之預解痘毒七八月蔌三伏日剪葫蘆須如環子腳者陰乾於除夕煎湯浴小兒可免出痘又蜡月梅花采將開者曬乾為末煉蜜丸未出痘兒可與三四服加朱尤妙三豆飲治天時痘瘡預服此飲疏利解毒縱出亦稀用綠豆赤豆黑豆各一升甘草三兩水煮極熟任意食品店豆與汁七日乃止消解痘毒紫草一錢陳皮五分蔥白三寸新汲水煎服痘出不快芫荽四兩先用好酒二盞煎一二沸方入芫荽氣即起又韭菜根煎湯服之又老絲瓜近蒂三寸連皮燒存性研末沙糖滾水服痘毒黑疔紫草三錢雄黃一錢為末以胭脂汁調銀針挑破點之痘瘡作癢宜燒茶葉煙薰之痘後癰毒赤小豆末雞子清塗敷痘瘡不收靨牆上白螺螄殼洗淨煆研摻之痘後日翳天花粉蛇蛻洗焙等分為末用羊肝披開入藥在內米泔煮熟切食旬日即愈痘瘡黑陷倒靨蜡月取乾人糞煆灰為末沙糖水調服痘爛生蛆嫩柳葉鋪席上臥之蛆盡出而愈痘疹入目取黑狗耳刺血滴眼其瘡自落發痧疹櫻桃核打西河柳又名觀音柳冬月用風乾者蔥白各等分同煎飲之異授終身不出天花神方大麻子揀肥白者去殼三十六粒硃砂透明者一錢麝香要真者五釐將秒砂麝香二味同研細然後入大麻子一處區研極細成膏子於五朋五日午時搽小兒頭頂心前後心兩手心兩腳心兩肘兩腿灣兩脅窩通共十三處俱要搽過一次出痘數顆次年端午再搽一次出痘一二顆再次年端午又搽一次永不出痘如若未過周歲小兒於七月七日九月九日搽之此方能奪天地造化之功傳方之家不出天花已十三代矣見知聞知普概傳之抄寫或與人莫大陰功也稀痘方小兒臍帶落後安淨瓦上用炭火炙乾止令煙盡勿使成灰取出碗覆地上出火氣為末即以乳調服日後出痘自稀又方金銀花揀淨七兩陳六安茶三兩多年者佳右二味為粗末每日沖湯代茶飲數次終岙不出天花出亦稀合前列數方體用兼全其功效自然神異小兒麻疹內熱煩燥口中乾燥津液全無者時與綠豆湯飲之後用白頸大蚯蚓曲鱔搗爛沖新汲井水發清不拘時服大效痘毒方大蚌一個取肉用黃泥包裹火煨至紅色取蚌肉研末麻油調敷痘瘡敷日陷頂漿滯不行用水楊柳葉水楊柳葉圓闊而尖枝條短硬與柳樹不同如無葉用枝取四五斤用河水一大鍋煎湯薰浴冷再添湯良久以燈照見累起有暈絲者漿行也如不滿再浴之力弱者只洗頭面手足如屢浴不起者血氣敗矣不可再浴邕出及癢塌者皆不可浴此方百發百中痘疹抓破成膿者用蓋屋多年陳爛草蓋牆頭草亦可為末擦之若渾身膿水沽衣難以坐臥用二三升攤席上令小兒坐臥即安
