body:
  text: 村居救急方卷六外科症無名腫毒於端午日正午時以青布包大黃紮緊入糞坑中浸至十二日午時取出以清水洗淨風乾以醋磨敷之屢驗如神每年備用又方合硬白丐作圈圍瘡上用黃豆稻穀共麻細末水調作點心樣空其底比瘡大些蒸熟乘熱加瘡上冷則換熱者數次則生者熟熟者出膿愈無名腫毒用核桃七個劈開取出桃肉用全蠍七個同桃肉略搗仍將於殼內將殼合好以線紮緊用黃泥裹成團放炭火內煆之先起青煙後起白煙隨即取起入罐中悶息冷定去泥研為細末酒沖服儘量飲醉出汗即愈如村居一時無全蠍只用核桃殼半個以乾人糞填滿刮平合在腫毒上殼外用艾火燒灸以桃殼炸破為度毒自愈毒蛇咬亦用此方發背用生牛肉一斤陳石灰四兩共打爛罨患處一日一換神效又方如意草搗爛和醋糟為餅貼之一日換數次又方初覺時便用艾於患處灸至癢癢又灸之痛使毒氣隨火而散最為良法惟在頭面者忌之發背腫毒妙方藤黃二錢五分五倍子二兩共為末米醋調圍之替針散癰疽不破者蠶陳殼一個煆存性為末酒調下不可多用背毒未成者用蟾一雙擊放瘡上半日置水中放其生再易一雙放之又易一雙則毒散矣已成者用大蝦蟆一個剝其全身癩皮蓋貼瘡口先於皮上以針刺數孔以出毒氣多年惡瘡百方不瘥或焮腫不已以馬齒莧搗敷之不過數次即愈諸惡瘡毒茨菇葉搗爛塗之立便消退兼治小兒赤遊丹毒野者更佳又方芙蓉葉或根或花或生搗或乾研蜜調塗於腫處四圍中間留頭乾則頻換已成未成俱效或加生赤豆末更妙癰癰疽陰毒黑陷不痛用艾葉一斤硫黃雄黃末各五錢以水同煎半日搗極爛乘溫敷上再易十餘遍知痛可生不知者死癰腫無頭新生鵝蛋殼燒灰存性為末醋調敷即出膿血諸毒潰後不長肉用白蠟一兩冰片二分研勻敷之深者填入即愈疔毒初起白礬末三錢蔥白七根同搗極爛分作七塊每用熱酒一杯送下服畢蓋暖再飲蔥白湯一杯少頃出汗如淋即愈疔瘡凡疔一覺急以磁鋒剌入二三分擠去惡血恐藥一時難覓急尋蝸牛連殼搗爛敷之或菊花根葉搗敷就以菊汁和熱酒下出汗即愈慎勿遲延而誤事也拔疔方銀硃一錢濫雞屎一錢荔枝內十個蝸牛即蜒蚰螺螄也烏梅肉十個先用麝香塗疔口將前藥共搗敷上痛即止其疔一夜拔出血疔神方一窮如針眼出血不止或生肘下或生眼角用真麻油四兩無灰好酒和勻熱服其血即止再以野菊花濃煎常飲切忌茶湯消疔毒胡椒廿五粒獨頭蒜一個蔥白三根共搗爛攤油紙上作膏藥貼之即消血絲疔五倍子搗再以濫雞屎調入同搗搽上立愈指頭蛇疔雞蛋一個去白用黃以荔枝肉嚼爛攪勻裝入殼內套指頭上即清又方豬膽一枚八雄黃末五分攪勻汁內套指上縛之手足忽起紅絲最為急症如走入胸中即可喪命宜急用大針橫截紅絲所到之處刺之令其出血以膏蓋之或嚼浮萍草根敷之立愈內用明礬末三錢蔥白七根搗爛分作七塊每熱酒一杯送下以衣被蓋之如無汗再服蔥白湯出汗為度戎發物房事濕痰流注神方土茯苓磁鋒刮去皮木杵打碎四兩膽星二錢川貝僵蟲炒銀花槐花炒五倍子各三錢橘紅秦艽防風各一錢防已八分木通一錢甘遂去皮八分皂角子鮮者九粒打碎肥皂子鮮者十粒打碎虛人加石斛苡仁米各一錢痰在頭頂胸者加夏枯草一錢在背加姜活五分在脅加木瓜二錢牛膝一錢五分用河水九碗煎三碗早午晚各服一碗痰在心之上食後服在心之下食前服如虛者分二劑極虛者分三劑小兒分四劑忌食監醬茶醋豬肉鮮魚雞鵝發物煎炒姜椒菸酒生冷但方內有甘遂恐別丸散中有甘草相反者切不可能已破者止服四五齊不致流於他處隨用十全大補湯加川貝二錢五分石斛二錢乳香炙四分須數十劑全愈如多火之人減去肉桂十全大補湯方書俱有瘰癧初起未破者將丐照瘡大小略離患處作圈圍者取槐樹根白皮照圍略小入丐圈中用艾茸作一丸於中心灸之肉上覺漸痛即拂去再灸如此三遍其丐圈不動槐皮要換三次連灸三日即消瘰癧膏方陳滴醋八斤肥皂五斤去筋膜二味同熬如膏再入黃蠟四兩退火氣七日用紅緞或紅布攤貼又方左顧牡蠣須斤許者佳火煆醋淬七次研末極細每兩入冰片八釐每早晚各三錢滾水下未潰者內消已潰者收口忌一切氣惱房事如犯者重又吃起瘰歷痰核內消妙方好鉛三兩鐵器內炒取黑灰陳醋調塗以舊帛貼之頻換去惡水如此半月不痛不破內消為水而愈瘰癧效方肥皂中仁八兩夏枯草一斤元參一斤共為細末煉蜜丸梧子大每服三錢食遠服至凶者二斤即愈忌一切發物並栗子醋糟肝腸豬首鴨蛋等物一切破爛瘡多年結毒魚口疳瘡不愈神效雪白燈心半斤冬月極冷時將燈草入水濕透放陰處凍一二日研為細粉加乳得沒藥輕粉冰片各些須研勻敷之藥須冬月制就楊梅結毒潰爛不堪硃砂透明者飛滑石粉白共細末每服三分三釐用土茯苓十二兩捶碎拌勻陰陽水六碗煎至三碗渣再用水三碗煎半碗分早午晚溫服忌鹽醋茶一切發物服至月餘愈楊梅七貼散細葉野艾根二兩無則用金銀花土茯苓四兩忌鐵器打碎生豬油一兩直殭蠶七條研院蟬蛻翅足全洗淨七枚肥皂核肉七粒皂莢子七粒打碎共作一劑空心用水六茶杯煎三杯服午前四杯煎二杯服臨臥二杯煎一杯服每日一貼連服七日未發者暗消已發者收斂永無後患毒草深者用十四貼梅瘡初起用豆腐四兩中心開孔入杭粉二錢盛一碗內蒸熱先將蔥三根略煨嚼下後吃完腐粉再飲熱燒酒一二杯用棉被蓋暖於不通一線風處臥出臭汗一身人不可近近則過毒汗不要出盡衣被送於野處露洗之又楊梅結毒方鳳仙花熬水棉絮蘇洗拭乾以冰片搽之又方皂角子當歸白蘇皮五加皮金銀花各二兩分八劑每劑加土茯苓四兩煎服廣瘡初起活黃牛膽好黃酒燉熱沖服以醉為度雄豬膽亦可腳縫濕爛鵝掌皮陰乾燒灰存性為末乾摻痔漏青黛四兩大露蜂房一個去頂將青黛入內用紙封好香油內浸七日取出露七夜焙乾為末煉蜜丸桐子大每用狗肉汁送下七十丸其管自落痔方木鱉子一個醋磨濃汁塗之許芷庭又方冬青葉濃煎入朴硝乘熱薰洗或魚腥草煎洗以枯礬入冰片少許敷之能以熊膽塗之諸方不及冬青即女貞樹又治漏方柳上黃耳燒煙薰之久而效柳上黃耳即柳樹上菌子偷糞鼠貓屎井底泥和勻圍之立愈一切痔漏野錢兒蜀葵根枸根水邊楊柳須各一兩先薰後洗耳恭聽數次即愈橫痃青果核七枚燒灰研末酒服立愈又方菜油二三兩入少年頭髮二三錢銅杓煎枯去渣用去殼雞蛋二三枚放碗內以滾油傾下連油蛋食之立消治魚口便毒活山羊解鋸下燒灰每服二錢好酒送下連服二三次即愈左用左角右用右角或豬蹄甲亦可蹄甲亦燒灰用又方棉地榆白酒三碗煎一碗空心服雖有膿者亦愈加穿山甲同患處大者二片土炒引經更妙鶴膝風鱔魚不拘二三條同酒糟搗如泥加麝香三分敷患處紙隔布扎六七日內作熱任他熱熱後即愈又方蘄艾半斤煎湯乘熱薰洗一日數次又方陳石灰芙蓉葉生薑蒲黃各四兩共打一塊如膏藥一般貼之三次即愈又方薴麻根數兩健豬腦子二個同搗爛又入乳香沒藥各二錢和勻敷之腸癰小腹堅硬如掌而熱按之則痛肉色如故或焮赤微腫小便頻數汗出憎寒或腳縮不伸者服之神效大黃炒朴硝各一錢丹皮白芥子炒研究院桃仁研各二錢空心煎服懸癰生在肚門前陰囊後兩交界處初如蓮子漸如桃李宜急治之大粉草四兩長流水浸透炭炙乾再浸再炙三次切片同當歸三兩水三碗慢火熬至稠將好酒對勻食前數次服未成即消已成即潰潰即收功臟毒人中白以泥固火煆去泥一兩川烏一錢草烏五分乳香五分沒藥五分共細末桐油調敷又方乾柿燒灰米飲下二三錢膿窠疥瘡單板機黃二兩黃柏二兩斑毛七個豬板油四兩同入杓內熬枯濾去渣入研爛大楓子肉四十九粒調勻搽之黃水浸淫傷手等瘡水銀一兩用鉛六七分死之雄黃一錢枯礬官粉五倍子五分共末濕則摻乾則香油調搽魚胞瘡身上忽起水泡如魚胞破之惟流清水已而又起甚痛以蜘蛛網纏之即落如再起再纏二三次即愈葡萄瘡其色紫如葡萄此瘡令人心煩亦惡瘡也用小榆條如針細者去皮橫堅穿斷去血即愈膿巢瘡血風並效雄黃二錢五分硫磺二錢黃柏二錢石膏一錢為末菜油調搽風疾癬癩藥酒方秦艽當歸功於天麻姜活五加皮防風各二兩白花蛇一條酒浸去骨老酒一斤煮三炷香入土埋一宿停六日漸次飲之其渣曬乾磨末水滴丸服狗癬疥初起小顆極癢漸成片出黃水者狗脊二兩砂黑地榆二兩炒黑枯礬五錢寒水石一兩蛇床子一兩二錢硫黃用渾酒腳煮乾五錢共末熟豆油調搽頑癬硫黃燒鹽土大黃根俗名牛舌頭草同搗爛每洗澡後穿山甲刮破搽之疥瘡川椒尖檳榔各三錢蛇床子枯礬各二錢雄黃水銀輕粉樟冰各三錢楓子杏仁各四十九粒共研細和勻加桐油一兩為丸患處滾之癩疥瘡方硫黃四五錢用監滷半杯將硫黃在瓦器內以文火溶化入監滷中再溶再入如是者七次至第八次在泥地上掘一孔以硫黃倒入膈一宿取出以麻油磨塗立愈竺岩鵝掌風番木鱉常山各一兩同桐油四兩浸七日取油搽患處外有松毛川椒燒煙薰之不可下水又方連須蔥白搗汁半斤熬成四兩入好蜜四兩再熬一半每晚搽之以火烘乾終身忌食忌鵝肉風疹癢甚爬隨起疙瘩大小累累不斷者艾葉菊花金銀花各等分葉亦可獨頭蒜共搗爛入雄黃二錢麝香少許塗三四次即愈癬花椒煮濃汁乘熱泡洗仍將椒研爛敷癬上數次即愈癩疥麻油一杯入雞蛋一個銅杓熬枯去蛋又入川椒二錢煎枯去椒又入研細硫黃明礬煎數沸取起搽之黃水瘡小兒頭上最生此瘡松香一兩研細裝蔥管內水煮去蔥枯礬五錢飛丹二錢輕粉五分無名異少許共為末香油調搽禿瘡剃頭後以銀匠店中漬銀水熱洗一遍切蒜瓣擦之或搗爛敷之或用豬腳爪煆末麻油調搽三四次除根蟮拱頭小兒夏月頭上多患此毒出膿又脹綿綿不愈實為厭用田螺肉韭地蚯蚓泥共打勻做膏貼之或用澆銅杓擔上化銅舊罐研細桐油調敷並效大人小兒遍身赤腫火毒生大黃皮硝各等分共末用扁柏葉搗拌調敷火丹滿身生遍形如水泡者用小兒胎衣缸內水以雞毛抹上隨手而愈又方赤遊丹美人芭蕉貼患處桐油煎滾用生薑切片蘇熱油於蕉葉上擦之立愈渾身生猴子芝麻花每日擦不住手即愈白蛇纏腰腰間忽起紅泡若不早治被其纏到不救用蛇殼一條燒灰存性廁坑板上浮泥刮下同研細童便調敷數次即愈汗斑蜜佗僧為末以隔年陳醋調搽隨手而愈鼻疳爛通鼻孔鹿角明礬各一錢瓦上煆過人發五錢燈上燒灰共為細末花椒湯將患處洗敷之如不收口以瓦松燒灰敷之鬍子瘡五倍子和棗肉煆三錢銅青一錢輕粉枯礬松香各三錢羊須一錢燒灰如無以水楊須代之黃連一錢檳榔杏仁去皮楓子肉各三錢黃細末香油調搽膿耳水聾骨一錢硼砂五分為末吹之又方海螵蛸五分麝香三釐為末吹之舌腫滿口或出血蒲黃末摻之坐板瘡用尿屎處磚燒熱上鋪大麻子葉即萆麻子葉乘熱坐在磚上湯不過一二次即愈又方松香五錢雄黃一錢蒼朮三錢共末和勻綿紙包撚作紙條二個臘豬油溶化浸透火燒滴下油搽之又方陳荷葉煎水常薰常洗生芝麻嚼爛敷之腎囊風癢不可忍用大葉楊柳葉煎水薰洗或牆上醬板豆草煎洗後以蚯一切濕爛血風廉瘡黃柏末甘草末各五錢輕粉二錢以手研細糞坑中舊磚瓦洗淨以炭火燒紅淬入醋內如此七遍為末一兩共為一處桐油調敷早晚二次先用米泔水洗然後上藥傷手頑瘡久不收口蘆甘石赤石脂各一錢入銀罐煆紅淬入黃黃芩柏湯內去湯曬乾松香七分冰片一分共細末用白佔二錢化開調藥在內塗之先用甘草湯洗臁瘡朝腦松香杭粉蔥白雞蛋清健豬油各等分搗爛用油紙二層上雞眼皮燒灰存性加冰片少許搽之或溪港內年久螺螄殼燒灰加冰片亦妙又方面紛置鐵刀上以炭火焙黃色油透舊羅緞帽沿燒灰各等分研細搽之宜用甘草瓦花煎湯洗之女人陰疳五倍子整者一個開一孔入兒茶黃柏末填滿其中入銀罐內煆存性每用一錢加冰片二分龍骨三分共研細末摻之再以熟豬肝夾之裙風瘡甘石醋煆為末麻油日日調敷濕毒臁瘡麻油二兩入川椒三十粒熬枯去椒加輕紛二錢研細蠟白一兩收成膏以綿紙攤成膏藥先用苦參湯洗後貼之二日一換頑瘡不收口兒茶龍骨煆各一錢輕粉滑石各五分冰片五釐為細末苦茶洗後以紗管盛藥彈患處千捶膏貼一切惡久不愈頑瘡能拔毒去腐松香一錢萆麻子四十九粒銅青二錢共捶千下捻成膏藥貼之熱癤生半夏監飛丐各等分為末陳醋調敷調即消去爛肉方巴豆仁炒煙起焦黑為度研極細末摻之去腐之去腐生新遍身發癢或生細瘡用七月七或七月半收紫背浮萍煎湯洗或煎服一切惡瘡疼痛並疥瘡俱效取蒼耳梗內蟲以陰陽瓦焙存性研細每服一錢空心溫酒下口舌生瘡黃連炮姜灰青黛兒茶各等分為末摻之舌卒腫大塞口不治殺人百草霜和酒塗之或以蒲黃乾姜等分為摻之內用甘草濃煎漱之百草霜須燒野草者是唇裂生瘡黃柏末以薔薇根汁調塗牙齦疳爛臭敗者胡黃連五分膽礬盛於青魚膽內陰乾為末吹之立效咽喉痛腫燈草一錢黃柏五分並燒灰存性枯礬七分冰片三分為末每以二三分吹患處鶴膝風肥皂二個去子五倍子去灰皮硝各一兩共研末用頭酒糟四兩沙糖一兩薑汁半茶鍾和搗敷膝上乾加燒酒潤之十日愈天泡瘡絲瓜水調官粉敷若日久作爛疼痛不已膿水淋漓者石膏煆輕粉各一兩青黛黃柏各三錢共末甘草湯洗淨摻之或用瓦花汁調抹之風疽腫毒麻油熬蔥黑色趁熱旋塗自消又陳小粉年久者愈佳鍋炒黃黑色研以陳米醋調熬如黑漆狀瓦罐收用紙攤剪孔貼之冷如冰痛即止少頃覺癢乾不可動毒消藥脫神驗一切腫毒痛不可忍萆麻子仁搗敷即止惡瘡腫毒人不能識者取獨頭蒜二顆搗爛和麻油厚敷乾則易渾身疥癩端午日午時採番白草每用一握煎洗效又方苦參半斤河水煎數沸入雄豬膽汁四五枚淋洗血風瘡千年石灰研搽之又方黃柏一兩以豬膽汁拌之曬乾數次研細枯礬三錢花椒湯洗後摻之或用桐油調搽大麻風鬚眉脫落扃柏葉九蒸九曬為末每服一錢一日三服滾水下厲風瘙癢遍身疹癩毛落須脫白花蛇一條首尾全者酒浸二三日去骨陰乾苦參四兩共為末以皂角五斤去皮弦酒浸一宿取出用水熬膏和丸梧子每服七十丸以防風通聖散送下又方經霜皂莢刺為末隔一日空心酒下二錢忌發物又洗方艾八兩明礬四兩楝樹根皮八兩每日煎湯浴之防風通聖散方防風大黃赤芍薄荷川芎當歸甘草朴硝山梔連翹黃芩桂枝白朮麻黃荊芥滑石石膏各等分河水煎囊癰用野紫蘇葉面青背紅者是焙乾為末敷之中燥以得油調敷對口番瓜蒂燒灰存性麻油調敷偏者妨諸毒傷蜂蜇毒小便洗擦拭乾香油搽之或雄黃末搽之或瓦花搗塗之蟹毒蒜汁黑豆汁紫蘇汁俱可解解中河豚毒一時無藥急以清麻油多灌吐出毒物又方蘆根汁或金汁服之愈自死六畜毒壁上黃土水調服或飲人乳一碗解中砒毒黃佔四兩快刀削入鐵鍋內用水四碗煎至二碗待溫灌下如蠟不盡掐作小丸灌下其毒蠟裹後大便出又方綠豆粉四兩黃泥飾淨四兩雞子清九個共一處以浸豆水和服風犬咬毒拔去頭頂紅髮一根搗蔥敷患處急於無風處掐去惡血如孔乾以針刺出血鹽湯洗淨用糯米一撮番木則加一個連前藥炒黃去斑毛不用研末酒服忌房事聞鑼聲終身不可吃犬羊肉又方即將風犬打死取血和老油服之又取犬心酒煮服此方神效不必服他藥亦不必忌口誤吞螞蝗為害最毒但多服蜜即愈或飲地漿亦妙解諸藥毒蠶脫紙燒灰研細每以一錢冷水調下少頃再服雖面青脈絕腹脹吐血服之立效亦治牛馬誤食蜘蛛腹脹欲死凡覺中毒即以生豆試之不聞腥氣即是人咬傷熱尿洗去牙黃並血嚼生白果塗之如痛以麻油紙燃焰薰之用乾屎裝荔枝殼內加艾灸以不痛為止咬傷指頭久則脫爛手指急用熱尿入缻將指浸之一夕即愈如爛手用夾蛇龜殼燒灰敷之虎咬搗青松汁敷升飲之以渣敷患處頻易即愈毒蛇咬全蠍二個洗去泥蜈蚣一條同炙研末酒下立愈鼠咬斑毛燒灰入麝香少許津唾調敷或以吳萸擦貓鼻取涎塗之蠍子傷杏仁七粒蔥白三寸搗爛津唾調敷立愈惡犬傷以米泔洗淨毒以熱牛糞封之即時痛止又方刮內店墩上油膩和沙糖敷之又方多年舊屋瓦上青苔刮下塗之立愈毒蛇咬傷以大藍汁小藍楷搗爛敷之又方五爪龍草敷立愈其草牽藤莖光每葉五辨面光者是多生屋邊陰處如葉七辨莖有毛者非中蚯蚓毒小兒受之則卵腫用鹽湯洗鴨血塗之諸色惡蟲咬傷用薑汁先洗患處用明礬雄黃為末搽之蓑衣蟲傷其蟲隱壁間以尿射人遍身生瘡狀如湯火傷烏雞翎燒灰雞子清調敷百蟲入耳薑汁少許滴之或蔥汁雞冠血亦妙又法用紙塞耳鼻留蟲入之耳不寒閉口勿言少頃即出毒蛇咬傷用針剌傷處出血急以繩扎兩頭浸糞缸中毒不肉攻以煙管燒滴油搽之百試百驗蜈蚣咬鮮扁豆葉揉爛敷之又刺雞冠血塗之又以草紙點火薰之立止又蜘蛛置患處自吮其毒解鹽滷生豆腐漿灌之再以鵝翎絞喉吐之即活食毒鱉飲藍汁數碗或靛青水亦可燒酒毒用白蘿蔔或熱尿灌之牛肉毒烏柏樹根皮酒煎服或野菊花連根搗汁服野菌毒飲以地漿掘地二三尺傾以新汲水桶許用棍攪之澄清即地漿也天絲入目用梳垢為一丸放眼角邊即出煙渣入目用亂髮或綜纓緩緩揉之即愈如將湯洗必疼傷眼麥芒入目煮大麥汁洗之即愈誤食麥芒取鴨涎食之即消竺岩膝瘡用螃蟹唾沫搽或磨刀水泥塗之或用彬木煎湯洗或蟹殼滑石未蜜讞搽或石膏輕粉韭汁調搽誤服桐油吐不止急飲熱酒一杯即解中斷腸草毒生雞子三四枚灌之或服熱羊血碗許總宜吐盡為妙婦人打胎誤服鉛粉每至欲死急搗蘿蔔汁飲之誤吞針米飲調炭末三錢或用蠶豆煮熟同韭菜吃針後大便出誤吞銅錢多服荸齊自化誤吞金銀銅鐵等物取鳳仙子或根搗汁服自下或多吃麥芽糖即白糖也魚骨刺喉用紫玉簪根搗汁以茶匙挑灌不可沾齒如沾齒落去為其化骨不化肉也又即以魚淨肉滿口咽之即下諸骨哽喉以硼砂含化食頃即愈或以鳳仙花子二三十粒研細白湯下箭頭針刺人肉不出用萆麻子去殼搗爛敷之癢而即出又方巴豆仁略炙與蟑螂同研塗之痛定覺微癢忍之待極癢不可忍便搖動拔出速以生肌藥敷之銃子入肉蜂蜜不拘多少衝好酒飲醉即出如無用黃蠟亦可或用舊銀罐同水銀研入患處其鉛即化隨水銀出諸骨哽咽威云一兩二錢砂仁一兩研沙糖一盞水二鍾煎一鍾服魚骨哽咽飴糖如棗大吞之不下再服又口含硼砂咽汁即下跌打損傷止痛散血好酒糟一團生薑四兩搗爛同炒熱布包搭患處以大錫茶壺盛滾水煨之冷則換更吃童便好酒以醉為度或以本人頭髮一縷燒灰酒下又飲以熟麻油好酒臥火燒地上一覺而痛腫俱消跌損傷力畜血歸尾三錢地鱉蟲三錢研元胡一錢胡桃肉五錢紅花二錢蘇蘇木五錢酒煎服不可見水手足跌折接骨神方五加皮四兩為細末雄雞一雙重七八兩者去翅頭爪並腸胃毛入加皮同搗爛先於跌碎處整理對縫不可少有差錯然後以雞攤於布上周違裹紮縛緊不可搖動又用彬木薄片十餘條首尾各攢一孔以繩穿相連四下再裹於外方不轉動藥敷一伏時將此藥再換其骨自接並沒疼痛有換三四次者不等以後只用加皮四兩煮紅糖為膏敷至平復為度若不先理對縫明白若差毫釐敷藥則多長一分切記折傷斷指破唇缺耳胡桃隔炒為末千年石灰血竭降香節白占各等分為末敷之跌損用白公雞一雙連毛皮去頭爪腸胃搗爛入飛面少許同搗先將湯浴患處然後敷上包緊伺患處作癢方可去藥一切刀傷磕損跌撲腫痛或出血用蔥白細切搗爛炒熟敷患處蔥冷再換神效刀斧傷出血不止用陳石灰同韭菜搗爛陰乾研細罨之立刻止血生肌或用黃亮松香研細罨之即止雖切斷亦接莫下水端午日合更效又方刀刮青石末摻之金瘡血出不止紫黑降香節銼末微炒出汗五倍子打碎炒黃色各等分為細末摻之跌打損傷切莫用水洗洗則難好急用古廟屋上多年瓦任取一片拌滴醋燒乾乾又拌一連七次研細沖熱酒飲醉立愈又方來往人尿處舊磚燒紅醋漓淬研末酒下立愈跌作接骨取活蟹搗爛沖熱酒服儘量飲醉再以渣罨患處半日骨內有聲即接或用菜瓜子三錢略炒為末酒下數次即接在上者食後服在下者食前服骨碎垂危用乳香沒藥各三錢研碎以滾酒儘量服之頭面手足踢或擦壞皮肉冬青葉同醋煮數沸略滴麻油少許在內取葉換貼自好閃腰打傷閃肭並手足損傷不出血但有青腫紫色風傷者先以蔥白搗爛炒熟將痛處擦遍隨用生大黃研末薑汁調敷儘量飲以好酒即愈打傷青腫用生豬精肉一片將當歸赤石脂末少摻肉上貼之又方切豆腐片如指厚於鐵片上烙熱搭患處冷則易之數次即愈打傷眼睛切莫用涼藥涼水則血凝難治如打出眼睛仍放眼內不可把瞳人背了將生地加酒搗爛敷之破傷風蠐螬蟲一個即土蠶兩指掐其腰口中吐出黃水抹患處避風汗出即愈蟲仍送土中治打綿臀錫箔用無根水濕過鋪杖處以手掌著辦拍打即消又方木耳四兩炒黃為末蜜調敷患上後高墜下或落馬欲死取老鴉眼睛藤搗汁服之以渣塗患處或韭菜汁或熱童便灌之或元胡索末三錢酒下日進二服夾棍傷急用熱童便一桶將足浸之如冷用燒紅磚二塊淬之即熱直浸至童便面上浮起白油其傷盡出矣再用肥皂搗如泥雞子清和勻敷患處以草紙包裹腳縛昆一夜不可動內服人中白一兩煆乳香沒藥各三錢箬炙牛膝三錢木耳燒灰五錢自然銅煆五錢共末用牛膝煎酒調下三四錢棒瘡膏麻油四兩煎滾入雞子黃三個熬枯撈去再入洗淨血餘五錢又熬枯勞去下白蠟五錢冰片三分和勻放地冷透薄敷患處竹木瓦刺入肉大活蝦七個搗爛塗之一時剌隨蝦出又方莧菜搗爛敷患處外以布裹定一二日即化鬼箭打山梔炒七個丐炒桃頭七個共杵餅貼患上次日取下作七丸投炭火燒響即愈肉刺雞眼萆麻子搗敷之或用活蜈蚣一條搗爛敷之腳墊傷痛人走長路緊急被石塊腳底墊腫不能行走痛不可忍急用舊草鞋底浸尿桶內一夜新瓦磚一塊燒紅以浸濕草鞋放磚上隨以腳踏上火逼尿氣入內節消如走長路兩腳腫痛亦用此法若不早治恐潰爛難愈手足開折用湯洗淨用黃占一兩溶化入松香末二分以少許安刀頭上溶化滴入折中湯火傷醋調黃土敷效或用板炭取浮水上者研細有水乾摻如無水用菜油調敷冷水心死浸冷水中心爛至骨或用蛤蜊殼炙焦研細菜油調敷又方白芨大黃以麻油磨塗鋤葉又方雞子清好冷燒酒調勻以雞翎掃患上乾則再塗立效又方活豬鬃剪下燒灰麻油調敷神效加輕粉硼砂少許更妙刀傷刎頸不斷喉者急以白蠟為細末滿填患處
