body:
  text: 村居救急方卷七五絶縊死者用一有力人抱住解繩不得剪斷輕輕放倒捻正喉嚨以手掩住口鼻勿令走氣一人以腳挺其兩肩用挽其頂發常令弦急勿縱再一人摩其胸臆屈伸其手足再一人以膝裹衣抿住糞門女人則連陰戶不令氣泄將筆管吹其兩耳氣回眼開仍然按引勿放用薑湯或米飲灌之能自咽乃止自旦至暮雖冷可救自莫斷繩輕輕鬆解放下刺雞冠血滴口鼻中白公雞尤佳又用皂莢細辛為末吹鼻中或以細蔥心刺耳鼻中有血出即蘇溺死將患人伏大橙上面時刻搖動之以鹽擦動之以鹽擦膝中待水流出即活但心頭溫者皆可救切忌提出倒水烘無救又法用鍋合地令死者腹對鍋臍覆上用人扶牢徐徐移鍋橫走以筋夾口中出腹中水即活又橫臥牛背上令人牽牛徐徐走領出水即活火燒悶死以新尿冷飲之或以溫水和蜜飲遍身燒爛或服蘿蔔汁或服童便隨所取好酒一二壅入缸中令患者浸酒中極重不死魘死切忌火照驚惶但狠咬其腳跟用皂角末吹鼻中打噴氣通即活或烏骨雞血滴口中立活熱死伏天行走熱極卒然昏倒斷不可與冷物遇冷即死移陰處取道傍熱土圍於臍上使數人溺尿於臍中熱湯沖洗更妙急以童便乘熱灌之再以布蘇熱湯尉臍下三寸立醒醒後忌與冷水即與道傍熱土和大蒜沖滾水灌之冬月落水凍死心頭有微熱者脫去濕衣解活人暖衣護之即用灶灰炒熱布包尉心上冷即換待氣回少與好酒熱粥湯若不先溫心頭便火烘則冷與火爭必死或用灶中灰一石埋之惟露七孔中惡或弔喪登冢入廟來鄉卒死口鼻流血但腹不鳴心下溫暖急用菖蒲搗汁灌口鼻自愈或切斷豬尾取血飲之半縛豚枕之立活卒中厥論風寒暑熱鬼邪陰濕氣薑汁一鍾童便一鍾和灌之效自刎法自刎之人斷食顙者易治斷氣顙者難治全要在知覺急早即將頭扶住乘其氣未絶額未冷急將活雞一二雙扯下熱雞皮冷則無用將線縫刀口周圍纏護用軟絹帛並棉花扎之外將女子舊布裹腳周圍再纏五六轉勿使泄氣其中自然合一令患者仰臥以高枕枕腦後使頭鬱而不直刀口不開冬夏避風衣被蓋暖若氣後口鼻通出方用白米一合入人參五錢姜三片同煎粥湯飲之接補元氣再延名醫調治可也倘能預備陳石灰二斤大黃四兩同炒石灰至桃花色去大黃將灰研細收瓶內過月出火氣再以降香末松香末外面多多敷之妙跌磕木石厭死氣未絶者急劈開口以熱小便灌之附余録驗方種子方調經當歸身四兩酒洗大川芎二錢白茯苓去皮三錢廣皮三錢制香附六錢吳茱萸四炒延胡縈三錢丹皮三錢白芍酒炒二錢若經水先期血紫者血虛有熱也本方加條芩三錢過期色淡者血虛有寒也本方加官桂炮姜熟艾各五分用水一碗半煎八分經水至日空心服渣再煎臨臥服一日一劑服至經止兩三日交媾即孕屢試輒驗又方凡人五十歲無子者是精寒不能得孕也服此方極效胡桃肉一斤肉蓯蓉一兩製附子五錢補骨脂四兩用酒略煮取起右藥共研極細末水泛為丸如桐子大每服一錢元眼湯送下避難全嬰方用綿作一小球略使滿口而不使閉其氣以甘草煎湯或甜物皆可炙之臨時縛置兒口中使咽其味兒口有物食之自不能作聲而綿軟不傷兒口蓋不幸而遇過難啼聲不止恐為賊所聞棄之道旁哀哉用此法活甚衆不可不知煮豆救飢方或遠行或荒歲皆可備急一時黃豆七斤芝麻三斗水淘過即蒸不可浸多時恐去元氣蒸過即曬曬乾去殼三蒸三曬搗為細末米粉糊為丸如胡桃大每服一丸可以不飢生産神效仙方治産久不下屬氣知虛者熟地黃一兩灸黃蓍四兩白歸身四錢西潞黨四錢炒臼芍一錢川撫芎一錢肚枸杞子四錢浙茯苓三錢此方大補氣血於臨産危急時無論産婦平素氣質強弱胞衣已破未破宜急以方內之藥連進三四劑不必用二汁恐其力薄也服後痛可立止胎自順下矣屢經試驗開玉門仙方即開骨散全當歸一兩川撫芎七錢灸龜版一錢杜血餘三錢用水二碗煎一碗如行五里之戶即生若死胎亦即下也有人産門不開兩日未生服此一劑即産真聖藥也六字真言唾忍痛慢臨盆唾將産時須要調養心神愛異氣力若能上休閉目安唾片時最好倘不能睡即暫時起身或扶人緩行或撫桌站立痛若稍緩又上休安睡但宜仰臥使腹中寬舒小兒易於轉動且大人睡下兒亦睡下轉身更不費力總之睡為第一妙法忍痛臨期第一要忍痛如初覺腹痛不問試胎與正産自已先立定主意生育乃天地自然之理世間極容易之事不必驚慌但看痛一陳不住連痛三五七陳漸痛漸緊方是大産與人說知以便伺候若痛得慢此為試胎且自安眠穩食品店寬心靜養使痛陳漸急自然易生慢臨盆將産不可輕易臨盆此是最要昆關頭不可認錯倘聽信穩婆說孩兒頭已在此以致用力太早或兒身未轉胞漿未破即便臨盆豆不有誤須看痛之緊慢真當其候方可至囑至囑要積壓天生天養當其時小兒自會攢出何須性急後來瓜熟蒂落水到渠成自然而然不待勉強及至生下産母亦自知其所然也亦余各方原書全缺社友炳章曹君後他書補入惟避難全嬰法一方得系吉生録於方便醫書中吉生附志
