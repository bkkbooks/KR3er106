body:
  text: 村居救急方卷一外感門傷寒初起三日內用陳細茶三錢核桃肉三個蔥白三根生薑五錢共搗一處河水煎和黃酒一碗熱服汗出自愈時氣初起三日以前者服五仙湯陳茶核桃肉艾葉緑豆以上各一握蔥三根右用河水將好酒各半煎服出汗立愈七仙湯凡傷寒時疫腫毒初起一服出汗百病皆除陳茶一撮大蒜一個搗蔥三根陳皮一撮霜梅七個生薑三片花椒七粒用好酒一大碗煎半碗溫服薑梨飲治時氣初起小兒更效大梨一個去皮木杵搗汁生薑二錢搗汁共一處加童便半酒杯重湯燉滾溫服被蓋出汗即愈棉子酒治初感寒邪棉花子一撮炒黃搗破用黃酒煮滾去棉子飲一大鐘汗出即愈感冒痧症於端午日正時以硃砂雄黃硼火硝麝香牙皂各等分研為細末每用少許點男左女右大眼角內屢驗如神每年備用忌飲食避風神白散治時行一切傷寒不問陰陽輕重男女孕婦皆可服之白芷一兩生甘草五錢薑三片蔥白三莖棗一枚香豆五十粒水二碗煎得黑色或誤打翻其病難愈如煎得黃色無不愈者煎時要至誠忌婦人雞犬見之天行熱狂芭蕉根搗汁飲時行熱毒或發斑或毒腫心神煩躁用藍靛一大匙汲水一盞服之山嵐瘴氣生熟大蒜各七枚共食之少頃腹鳴或吐或大便泄愈中暑發昏小青葉井水洗去泥按乾入沙糖擂汁急灌之傷寒結胸陳香糟六兩生薑四兩水菖蒲根四兩鹽二兩共搗炒熱為餅敷胸前痛處以尉斗之內響即去如口渴任吃茶水待大便下惡物愈發斑不出以白蠟燭照視心胸腹背隱隱紅斑不起在於肌肉取山羊乳飲之斑出病愈傷寒十數日大熱無汗神昏譫語垂危欲死用井水一小碗又雞蛋清一個和勻吃下虛者先戰後汗壯者戰而汗愈天行熱病狂邪不避水火欲殺人者苦參兩許為末水煎服或薄荷湯下瘟疫大黃四兩酒洗蒸曬乾牙皂二兩青黛一兩紫蘇葉一兩共為末水滴丸緑豆大每服百丸緑豆湯下三服愈治時疫不相傳染方用雄黃水磨塗鼻孔或雄黃一塊重五錢者以絹帛包緊頭頂心亦妙或以香油塗鼻中又以赤小豆同糯米侵水缸中每日飲之又以貫衆浸水飲亦妙霍亂吐瀉得此病莫與熱湯米飲急取灑水煎滾半碗再以冷井水半碗相和一處杓揚千遍入炒鹽三匙吃下陰陽分清其病立愈又方百沸湯半碗新汲井水半碗入潔淨黃土化開澄清入緑豆粉冰糖各五錢調服立效又方鹽一兩生薑五錢同炒令色變水煎溫服霍亂轉筋腳縮不伸者可用新汲井水一碗入炒鹽二錢服再取水一盆入鹽浸兩足即愈乾霍亂不得吐瀉臍腹急痛躁悶欲絶俗名絞腸痧用芋頭去皮以竹片刮碎和冷水去渣服再以炒鹽數兩布包放臍上用滾水一壺尉之冷即換又方用喬麥一大撮炒焦以滾水衝下待溫服之立愈心腹一切冷氣惡氣艾葉搗汁服之陰症腹痛面青手足冷者鴿子糞一大撮炒研末滾熱酒一杯和勻澄清燉服即愈路途之間偶得陰症無藥可救又無熱湯可吃急令病者睡倒著一人將病者腳後跟用力咬住令其知痛滾轉掙坐候周身出汗即愈又方雞蛋煮熱去殼趁熱在臍腹上旋轉摩之少冷即換連摩數次其毒即收蛋內或用蔥一把以綿紙裹緊切去須葉只用寸許單蔥白如餅樣放臍上以熱尉斗之即愈再以黑豆炒熟投酒熱飲或灌之吐則復飲出汗為度回生膏治陰症如神至危者亦可治整頓明礬黃丹乾薑各等分為末連須蔥數莖同搗敷臍以磚烙之灸陰症法男右女右中指頂以艾灸七壯或臍下一寸灸三大壯脹滿不得吐下用鮮紫蘇搗汁飲之或乾者亦可煎飲嘔噦不止蘆根二三斤水煮濃汁頻飲效又方刀豆子燒灰存性白湯調服二錢立止村居救急方卷二
