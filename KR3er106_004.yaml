body:
  text: 村居救急方卷四婦人科附益丸調經種子香附一斤童便浸透洗淨露一宿曬乾又浸如此三次益母草十二兩二味為末再用香附四兩艾二兩煎汁加醋大半煮糊丸每日百丸空心白滾水下月經不通益母草葉花更好庵閭子各等分浸酒常服乾血癆當歸全用五錢酒洗水煎早晚服半月見效血崩不止陳棕燒存性每用陳酒送下三錢又方多年舊褐子四指寬一尺許燒灰存性須看勿令有一點不燒透者研細和好酒熱服立止女人經脈不調腰脊痛骨節疼用丹參洗淨切曬為末每服二錢溫酒調下白帶白雞冠花曬乾為末空心酒服三錢赤者用紅又方硫磺二分入雞子內飯上蒸熟食之白血崩胡桃肉十五枚燈心燒存性研作一服空心溫酒調下又方老絲瓜燒灰存性陳棕燒灰各等分用酒或鹽湯服即止又蓮蓬殼荊芥穗各燒灰存性為末米飲下二錢又新綿一口燒灰空心酒下胎漏下血白茅草根煎濃服即止治孕婦偶因所觸或墜高被打胎動不可忍用砂仁放尉斗內慢火炒令熟透去殼搗為末每服二錢熱酒調下覺腹中胎動處術熱則安否則再服孕婦慣落胎整當昌一枝約重五錢整烏藥一板約重三錢每早煮雞蛋一枚三炷香為度取蛋並湯食之能保足月隨胎下血不止當歸焙一兩蔥白一握每服五錢酒一盞半煎八分溫服經血不止陳蓮蓬殼燒灰存性研末每服二錢熱酒下妊娠胎氣上衝心不安腹中脹痛紫蘇陳皮蔥白砂仁各等分酒煎服立效妊娠胎動或子死腹中血下疼痛口噤欲絶服此探之不損則痛止已損便立下當歸二兩川芎一兩為粗末每服三錢水一盞煎至將乾投酒一盞再煎一沸溫服或灌之如人行五里再服不過三五服便效難産三五日不下垂死乃矮小女子交骨不開者乾龜殼一個酥炙研婦人頭髮一握燒為川芎當歸各二兩每服七錢水煎服如人行五里許再一服生死胎俱下胎衣不下朱膝三兩水二盞煎溫服立下或以涼水入醋少許巽面即下胎動不安砂仁研細末一錢條芩一錢苧麻根一把洗淨打碎生薑五片煎一盞服之胎動下血腹痛搶心者用蔥白一把煮濃汁飲之未死即安已死即出不效再服治月數不足子死腹中母欲悶絶黑大豆三碗好醋濃煎汁三碗燉服立效一方加川芎凡孕婦臨月覺腹痛不可便用力須俟産門腫滿腰間重痛腹尖一處痛不可忍糞門迸急胞水或血俱下方是時候一用力即生矣如數症未見産門未腫雖痛即一日半日不可驚惶須勉強行走使氣血流動倘體弱倦怠即仰臥不妨照舊飲食但用大枕放兩腿兩口令産門不閉為妙妙若強之用力太早性命條關慎之又六字真言一日睡二日忍痛三日慢臨盆催生妙方不破整荷葉一張略剪去邊再用桂圓照孕婦年紀一歲一個連殼以銀簪刺孔數處將荷葉包好臨産酒煎服之又方柞樹枝切成小蝦約兩許甘草四五錢切蝦臨産時水二碗煎一碗服神效亦治衣胞不下催山四兩麻油一兩糖糖即蜜銀器溫煎産婦當如無銀器用磁罐入銀五錢煎更加一杯酒在內酒無灰者免教母子見閻王又方一烏梅三巴豆七胡椒細研爛搗取成膏酒醋調和臍下貼便令子母見分胞積庵橫生用乾黃牯牛屎二斤分作四股鍋內炒大熱以濕青布袋盛之替換覆産婦腹上尉之良久即時順生但炒時面將鍋安空處炒不可在灶上切記死胎不下脂油蜜糖好酒各等分煎一碗熱服即下亦治胞衣不下又方鹿角屑三五錢煎蔥豉湯調下立出胎衣不下多因兒産後血入胞中此非藥能取效治法先將嬰兒抱住勿斷臍用一伶俐老成婦人以右手二緊跟臍帶而上帶外將指向上半寸余摸之覺有血以指連胞衣向下一捺其血自覆衣自隨下每見胎衣不下誤服藥或用吐法甚至以足挂肚者大至喪命小至成病宜用上法最妙仍須安靜勿太驚惶胎衣不下乾荷葉滾水一衝即服立下如煎則不效又方朴硝三錢童便燉熱調服産後中風手足搐逆不省人事荊芥穗微焙為末每服三錢酒調下或童便服産後風狂苦葫蘆一個去頂不去子入鬱金明礬半夏各一錢為末再入陳老酒仍將頂封好埋飯內蒸透取出露一宿重湯燉服吐痰即愈産後閉目不語生明礬為末每服一錢滾水和下産後發暈慣有此病者先用艾葉春冬一錢秋夏二錢澤蘭葉二錢同煎一碗待生下後即將紅糖一兩和勻熱服無論暈與不暈服之皆有大益産後去血過多昏暈不醒者用韭菜一二斤搗煉入瓶中衝滾熱醋以缸口對産婦鼻孔取氣薰之即醒或以醋澆紅炭薰之或以漆器燒煙薰之如不醒急掐人中乃鼻下唇上也捉頭頂心發灌以童便薑汁自醒産後腥痛益母草切碎一大撮水一碗煎五分入童便一杯服或延胡索炒研酒服二錢甚效産後血不止百草霜須燒野草者酒調溫服産後大小便不通多服牛乳三日即通人乳更妙子腸不收萆麻仁十四粒研膏敷頭頂心腸上即揭去之內用薑活二兩酒煎服産後諸症宜生新血逐敗血用當歸川芎各等分每用五錢入好酒一杯煎將乾加水一杯再煎三四滾去渣服乳汁不下用雄豬白胰一個切碎鍋炒半熟入黃酒一碗燒滾空心連胰酒服二三次即下又方豬前蹄有孔者三四雙同細木通五錢石膏五錢煮熟食湯與蹄子即通又赤小豆煎湯頻飲即通乳脹不回大麥芽炒黃煎服神效乳癰初起用蒲公英一兩即奶漿草每莖開黃花一朵掐斷有白漿者是又名黃花郎草金銀花藤二兩搗汁和熱酒服仍以渣敷之或用香肥皂和紅糖敷乳癤神效方黃耆二錢角針一錢花粉錢半白芷一錢當歸錢半乳香一錢沒藥一錢紅花一錢瓜蔞一雙連翹錢半銀花二錢赤芍一錢加福酒一盞同水煎未成者一劑已成者二劑即消會經屢試屢驗竺岩乳岩乳癆敗龜板煆存性每服三錢糖拌好酒送下盡醉即消乳癧潰爛見臟腑者土棟樹子經霜者妙川棟不用雄鼠糞兩頭尖者是炒露蜂房煆各三錢為末每服三錢酒下間三日一服不數日膿盡收斂乳癰大熟瓜蔞一枚搗爛真白酒一大碗煮取一半去渣溫服又皂角刺燒存性二錢花粉一錢共研溫酒三錢婦人妖魅以生蜜塗陰戶自絶
