body:
  text: 村居救急方卷三雜症門中風四肢麻痺筋骨疼痛腰膝無力等症五月五日六月六日九月九日採稀蒼草葉洗耳恭聽淨曬乾入酒瓶內以好酒與蜜蒸之曬乾又蒸如此九次則氣味香美焙乾為末蜜丸空心服數錢酒下風濕手足麻木渾身疼痛洗方樟木蘄艾花椒生薑牛膝蘿蔔英入砂鍋內煎時先對患處熏蒸待溫洗之又方桑枝切碎香煎湯頻飲口眼歪斜頭垢不拘多少如偏向左放右手心內以壺盛熱水燙之向右放左手內以正為度又方鱔魚一條用竹片夾之用針深刺尾出血以血灘絹帛上乘熱貼之如歪左貼右貼左下即洗去兩腿風濕氣痛艾葉二兩蔥白一把生薑一兩五錢共搗爛用布共為一包蘸滾燒酒擦患處以痛止為度濕氣痛白芥子一合炒研院廣膠一兩老薑汁一碗好醋一碗同熬至一碗再下廣膠化開又下芥子末麝香五分和勻青布攤貼患處又方白鳳仙花浸燒酒飲之又方油松節晚蠶沙各等分浸酒常飲中風痰厥四肢不收氣閉膈塞白礬一兩豬牙皂角五錢為末溫水服一錢吐出痰效痰厥氣絶心頭尚溫者千年石灰一合水一盞煎滾去之再用一盞煎極滾澄清灌之少頃痰下立愈中氣不省閉目不語如中風狀用木香為末為瓜子煎湯灌下三錢痰甚者加竹瀝薑汁風痰危急喉閉湯水不下一服立解膽礬一錢木香三錢麝香一分蔥汁調斡口灌之立愈諸中卒然倒僕痰盛牙關緊急目閉用生半夏末吹鼻得嚏即醒牙關緊急白礬鹽花各等分擦牙涎出即開卒中不語苦酒煮白芥子搗爛敷頸一周帛包一書夜即好舌強不語龜尿少許點舌下神妙風熱癱瘓半身不遂或手足麻木用秋後水紅花連苗花實銼碎陰乾煎濃汁乘熱薰洗一日二三次再用熱酒和花汁飲取汗出為度數日自愈屢驗口眼喎斜大皂角五兩去皮子為末三年米醋調敷左喎塗右右喎塗左乾則塗之手足麻木不知痛癢霜降後桑葉煎湯頻飲骨軟幾疾腰膝疼痛行步不得大何首烏牛膝各一斤好酒一斤浸七宿曝乾木臼杵末棗肉和丸梧子大空心酒下五七十丸鼓脹用雄豬肚一個入檳榔末一錢牽牛末一錢砂仁末五分蔥三根再以整頭大蒜填滿為止線扎口入磁罐內酒煮爛去肚並藥單取蒜食之用汁二三杯少刻大便放屁不絶漸漸寬泰其大便自去黃水如不去水飲高良薑汁一小杯即去後服健脾藥更妙又方西瓜一個頂上切去一片去瓤入大蒜八兩去皮原頂蓋之用糠火圍煨三炷香取出大蒜食之又方用鯉魚斤許者一尾將赤小豆填滿魚腹不著鹽醬煮熟連湯食之三四次愈赤小豆即小紅豆也又方鳥魚一尾斤外者剖去腸入皮硝二兩外用厚棉纏包數層又以熟黃泥裹之糠火煨一夜敲得響為度去泥後頭至尾食之將骨焙糊丸酒下忌鹽醬百日如下愈再製一料服腹脹水腫小便不通老扁蒲陰乾陳者煎湯服又方亞腰壺蘆連子燒灰存性一個為末食前溫酒下不飲酒者白湯下脾積黃腫緑礬四兩煆成赤朱子當歸上兩酒淬浸七日焙百草霜三兩共為末以浸藥酒打糊丸如桐子大每服五七十丸溫水下一月後黃退立效氣脹氣蠱蘿蔔子研碎以水濾汁入砂仁一兩浸一宿曬乾又浸又曬凡七次為末每米飲服一錢通身腫滿春風葶藶子四兩炒為末棗肉為丸如桐子大桑皮湯下十五丸日三次面浮水腫甘遂一錢為末豬腰子一枚切作七片將遂未摻勻於內外以濕紙裹煨熱食之覺復鳴二便利愈忌鹽一月膈噎聖藥取貓胞新瓦炭火炙乾研細末每服二三分好酒送下粒米不下者五六次即愈酒內不可少有燒氣欲取貓胞以小木枷枷其項庶免自食又方古冢內飲瓶水頓飲一杯立愈仙方翻胃祕方將狗一雙關房子餓數日用香油拌糯米晚米與食之約有三升為度將所遺之糞盛麻布袋口於長流水中漂將為粉加木香末少許蔥白數莖煮粥食之即愈膈噎初起老薑一斤童便浸七日取出土內埋七日洗淨曬乾為末一兩白朮土炒一兩飯丸桐子大空心米飲下一錢又方韭汁梨汁薑汁人乳飯上蒸熟服之三日後再服祕授神治噎膈反胃用陳倉米一斗同山黃土炒令米熟去土為末以栗米煎湯調下再服後藥白水牛喉管一條去兩頭節並筋膜脂肉節取下如阿膠片以米醋一碗浸之頻番動令勻微火炙乾醋淬醋乾為度勿見日色只宜火焙研細末厚紙包收或遇陰濕濕時連紙微火烘焙收藏每服錢食前陳米飲下輕者一服立效此方名正胃散得於糞人君子可制救人梅核氣方元明粉一兩用人乳竹瀝二味和勻曬乾又拌又曬至三兩為度每用一錢加甘草末一分臨臥清茶化下截瘧仙方虛人久不愈者整當歸一枝切鱉甲二錢炙研知母二錢何首烏五錢料豆一撮向北桃頭七個以上藥用井河水各一碗煎露一宿清晨溫服不可經女人手二帖愈又初起者青皮四錢陳皮二錢甘草一錢水酒各半碗煎露五更面東服之又方未來之先日取朝北天麻葉九尖者方是包大喜蛛扎頭上莫犯陰人手立止或取東瓜花帶頭上神效三日久瘧鮮何首烏五兩打碎白甘菊二兩甘草一兩細茶一兩陰陽水漫火煎一小時露一宿清晨服又方枯礬研細醋糊丸黃豆大遇將寒時桃頭七個泡湯下七丸瘧久不止常山二兩切薄片好大紅棗二十八入砂鍋內水二碗煮棗黑為度去常山取棗去皮核清晨臨來之日空心白湯送下徐徐食之忌雞鵝茶蔥小兒減半當日即止百發百中小兒瘧丁香甘草各三分鳥梅檳榔各半個好酒一鍾煎露一宿向南早晨溫服受寒瀉痢生薑二錢陳茶五錢同煎入醋露一宿空服白者溫服赤者冷服紅白痢疾用扃豆花二兩紅用白花白紅花煎湯入紅糖一兩生薑汁五匙熱服即止又方用鮮蘿蔔英搗汁露一夜入紅糖空心服不遇二三次愈又方以豆腐炙灰紅則以赤沙糖拌服白則以白糖拌服每服約半酒杯服二三次即愈休息痢狗骨炙黃為末第服一錢米飲下日二服即愈噤口痢元明粉納臍中用活鱔魚一條以竹片三四根周圍縛之留尾半寸許快刀割斷滴血於臍四面離元明粉一韭菜葉許以手將血塗平一圈俟乾即時行去滯物便能飲食但魚血不可滴在元明粉上要緊久痢元眼七個蓮子七粒白糖三錢陳細茶末二錢臭椿根皮三寸水煎服又腸滑久痢石榴一個燉煙盡研末仍以酸石榴皮一塊煎湯服神效又方臭椿根向東南根皮置活水漂二日去外黃皮焙乾為末一兩加木香二錢糯米飯為丸每服二錢米飲下血痢不止乾姜燒黑存性放冷為末每服一錢米飲下暴瀉不止車前子炒為末米飲調下二錢其根葉普可搗汁飲又方陳艾一把生薑一塊水煎熱服寒濕泄瀉小便清者以滴燒酒飲之久瀉腸滑白朮炒茯苓各一兩陳糯米二兩炒為末棗肉拌食血痢及瀉血不止木賊草五錢煎服一日一次便痢膿血及酒痢久痢烏梅一兩去核燒灰為末每服二錢空心米飲下熱毒血痢金銀花藤濃煎飲之噤口痢糯稻一升炒出白花去殼再薑汁拌濕再炒為末每服一匙白湯下數服即好又方上好少糖四兩生薑四兩烏梅十五個三味共搗以滾水調勻服兼治翻胃盜汗不止黃耆蜜炙黑豆浮麥各等分煎飲癲癇甘遂末三錢豬心一個取管血和藥入內縛定紙包煨熟取出入殊砂一錢分四服以豬心煎湯下大便下惡特為交不下再服風痰癇疾山茨茹二三個以茶酒研如泥日中時用茶調下即臥久而吐出痰物永不發如不吐再以熱茶投之又方生白礬一兩陳松蘿茶五錢為末蜜丸梧子大一歲十丸茶湯下大人五十丸久服痰自大便出病愈風狂犀角四兩銼末每用一兩清水十碗熬至一碗濾淨其渣仍用水十碗熬至二小杯又用淡竹葉四兩小六碗煎至二碗去渣和前犀角汁服之盡四劑即愈失心瘋病忽悲忽笑者鬱金七兩明礬三兩為末糊丸白湯下數錢黃疸田螺不拘多少搗爛沖滾酒服以色轉為止又方生明礬打為上塊以乾豆腐皮少許包之空心白湯吞下第一日礬一分第二日礬二分照日加至七日七分每日吃三次七日內共用礬八錢四分其症自愈又方緑豆一升煎湯浴之自退又用薏苡根煎湯服俗名菩提粟黃胖腫紅棗一斤皂礬二兩八錢花椒三錢去子淨饅頭面三合共搗細滴醋為丸如胡椒大每服草五丸空心薑湯下忌鮮魚雞子生冷之物追蟲取積皂礬五錢入上白饅頭內火燉礬紅為度研末去饅好酒下五分數次愈寸白蛔蟲石榴根皮煎水煮米粥食腹中白蟲馬齒莧水煮一碗和監醋空心食之蟲盡出傷米食積白麵一兩白酒丸二顆炒為末每服二匙白湯調下如傷肉食山查湯下頭風方大蜈蚣一條用陳艾葉揉絨如蜈蚣樣長一條鋪在瓦上將蜈蚣放在艾上火灼艾置棹上令患人端坐以目視之藥盡為度鼻中有黃水出即愈再以鵝不食草塞鼻內又方白芷一味酒洗為末蜜丸彈子大清茶下或荊芥湯下又方生蘿蔔汁一蜆殼仰臥隨左右注鼻中神效又方南星川芎等分為琳入連須蔥白搗成餅貼太陽穴帕包又方稿本細辛各五分白芷一錢辛夷八分為細末分作四劑用四條紙捲藥在內火點以煙薰鼻吸入即愈痛久不除晴明天氣將發分開用麝香五分皂角一錢薄紙裹置患處以布包炒熱鹽於上尉之冷則另易數次不再發頭痛細茶一撮芝麻一撮研生白果二十枚搗同煎數沸服之走馬喉痺士牛膝根搗汁漱之一用牽牛鼻繩燒灰吹之土牛膝對節萬梗緑葉有紋又方壁喜窠燒灰登心燒灰枯礬各等分為細末吹之急喉閉於患人手大指甲後離韭菜葉許用大針刺出血立安男左女右危者左右刺之又用淡白梅子一個去核將蜒蚰一條嵌梅內含之立愈咽喉閉塞蠟月初一取豬膽五六枚川黃連青黛荷殭蠶白礬朴硝各五錢裝入膽內青紙包好將地掘一孔方濘一尺以竹橫懸此膽在內以物蓋定至立春日取出待風吹去膽皮青紙研末密收吹之此萬金不傳之方又方用瓦茶壺一把內入著炭一塊摻蛇床子一撮將蓋蓋蓋之以病人口對壺嘴吠煙入喉立開暴赤火眼大梨一去皮核明礬一塊如指大同搗如泥入碗內以綿紙蓋之捺一咼候汁滿咼用紙蘇汁抹眼數次又瓦松同明礬搗爛敷太陽上又大黃末新汲井水調敷兩眉頭兩太陽乾則以水潤之須臾腫消痛止風眼赤爛白礬煆一兩銅青三錢同研泡湯澄清洗之打撲損傷眼胞赤腫疼痛芙蓉葉生地等分搗爛敷之或為末用雞子清調敷損目破眼牛口涎日點二次諸物眯目藕汁滴目中洗眼方用經霜桑葉側柏葉菊花荊芥穗桑根白皮以上五味主方眵多加艾葉蒼朮作癢加赤芍川椒水一碗煎半碗露一宿一次早溫洗軟絹拭之每日二三次水宜用紙蓋勿令落入灰麝紅爛眼古文錢一文黃連五分艾葉三片杏仁七粒去皮研院煎好澄清一宿洗之昏花眼童便浸菊花洗之眼中起星荸齊捶碎取汁漉紙上成粉候乾刮取點之七精丹點一切翳膜昏花眼黑羊膽七個取汁百草之精人乳二碗氣血之精明礬七分石之精白蜜三兩五錢百花之精共為一處飲上蒸取谷之精須天氣清明日曬夜露取陰陽兩露之精若有云霧切不可出復蒸復曬待如膏狀點之又羊膽一個割開入好蜂蜜一錢線扎兩手揉勻白水煮一滾即取出以涼水浸半日找乾傾出內水點之雀目夜不能視黃蠟不拘多少化開入蛤粉相和得勻以刀切下二錢用豬肝二兩摻藥在內麻皮扎定水一碗銚內煮熟乘熱薰眼至溫並肝食之鼻淵腦漏白芷一兩薄荷五錢蒼耳子炒辛夷仁各二錢五分為末蔥白湯或清茶下酒渣鼻硫黃食鹽各等分為末放小鍾內入陳米醋比硫鹽高一指晚間於空處當天之下露之日間收屋內七夜為度將面上油洗淨以指黏醋塗之鼻自不止鼻血不止白蘿蔔搗汁滴入鼻內或頭髮洗淨燒灰存性為末吹入鼻內再以水服一二錢又方寶珠山茶曬乾為末每服二錢酒下又方用書匠所用白粉土研細五錢井水下立止鼻血不止服藥不應用蒜一枚去皮研如泥作錢大餅子左鼻血出貼左足心右鼻貼右足心兩鼻出俱貼之或用新汲水隨左右洗足即止或用冷水巽而或以百草霜末吹之或用冷水浸紙貼滷門上以尉之立止齒縫出血百草霜摻之立止舌上出血槐花末敷之腦漏鼻流臭涕者將患者左手掌盡處橫紋緊對鼻尖不可移動捺至頭上中指盡處是穴以墨點記之用艾茸如豆大灸七壯聽其略害結馮自愈耳聾用新苧麻作枕內包花椒四兩枕之牙疼用火硝燒紅淬入好燒酒內連淬數次將酒漱數次立止又方雄黃硼砂火硝各等分冰片少許共末擦之牙疳方蕉舊紅褐子燒灰七分壁喜巢土牆上者佳炙七分甘蔗皮燒灰七分狗屎內骨頭燒灰七分紅棗肉七分俱用陰陽瓦焙為末先將瘡用米泔水煎或甘草湯洗淨然後次藥又方人中白燉末一錢錢緑三分麝香一分共細研末擦之牙疼青監川椒露蜂房炒存性各一兩為末擦牙如痛急用末五錢煎湯漱之又齒出血酒炒大黃末二錢用枳殼湯加童便調下心腹痛陳香圓燒灰存性好酒和服二錢或用醋和水入古銅錢七文煎數十沸溫服疼而嘔者用明礬三錢研細溫酒和服疼而不嘔者用當歸五錢焙研細溫酒和服一切心腹痛沉香三錢牙皂三錢木香二錢五分胡椒二錢全蠍七個洗去泥硃砂四錢為末米湖丸如豆大每用薑湯下大人九丸十一丸小兒五丸七丸心痛欲死頭髮與羊糞各五錢炒脆為末酒下立愈又方可除根古石灰研細水飛一兩生熱礬各二錢五分研飛面為丸緑豆大大人用一錢二分中人八分小人四五分火酒下腹中蟲痛每發即吐蟲或大便多蟲者此蟲痛也取練樹根上白皮著泥東行者每用三錢煎湯露一夜或五更時先吃紅糠水一盞引起蟲口復進此湯其蟲自下不下再服此方在月頭用更妙用時莫與病者知蟲咬心痛香油一鍾燉溫服之或煎滾衝入燒酒一小鍾乘痛急飲又烏梅三個川椒十四粒煎服蟲積貪食一切物如茶葉壁泥桴炭石灰生米之類用芝麻一碟拌雄黃末三分吃半月愈或用生棐子一斤每日蘇少糖吃數十粒或同使君子肉四五枚半生半熟吃更妙痞二三兩鯽魚一尾去腸雜不下水以芫花塞滿肚內外以桑葉裹二層又以濕草紙包數層火內煨熟去芫花只吃魚白湯送下痞狠者不妨多吃又方青黛二兩明雄一兩為細末每服三酒下一日三次外用麝香一錢紅棗十枚獨頭蒜十個同搗爛青布包摩患處即化下又方生大黃樟冰各等分為末用獨蒜同搗膏攤青布上貼患處俟鼻中有蒜氣出即去之如過則皮潰爛矣其痞自化胃脘痛炒鹽一錢生薑七片水煎溫服立止心氣痰痛或死血作痛白蠟三錢痛時滾酒化下積年心痛不可忍煮小蒜食飽勿著鹽立效不發小蒜即野蒜也心腹惡痛口吐清水艾葉搗汁飲冬月以乾艾煎汁服之又方良薑酒洗七次香附醋洗七次各焙研各記收之痛因寒得用薑末二錢附末一錢因怒得用附末二錢薑末一錢寒怒俱兼用各一錢五分以米飲加薑汁一匙鹽一捻服之立止卒心急痛牙關緊閉欲絶老蔥白五根搗汁送入咽中再灌麻油四兩但得下咽即蘇絞腸痧痛若陰痧則腹痛手足冷但身上有紅點以燈心蘇油點火粹點上陽痧則腹痛手足暖將兩臂捋下惡血令聚指頭以針刺十手指近爪甲處分許血出即安或以蕎麥麵一撮炒溫水服或童便服或炒鹽一兩調口中卒然腰痛料豆六升水拌濕炒熟布裹尉之冷則易之脅肋痛白芥子水研敷之服亦可腰痛不可忍黑牽牛不拘多少微炒取頭末去粗渣不用以大蒜瓣用濕紙包煨令香熟共搗為丸如桐子大以硃砂為衣每服二十丸酒下腎虛久痛不治又方虛者宜之杜仲一兩鹽水炒故紙一兩鹽水炒好肉桂五錢共研末每服二三錢酒下數服大效又豬腰子一枚破開入杜仲末三錢大茴末一錢青鹽少許濕荷葉包煨熟好酒送下白濁初起立效大黃二三錢用濕草紙包數層灰火煨透研末每以數分用雞蛋一枚破頭入內紙封飯上蒸熟去藥空心食品店之不過數次愈又方生雞蛋沖豆腐漿空心連吃數日即愈偏墜疝氣小腸氣黑醜二兩用硫黃末五錢同炒同用橘核二兩炒大茴五錢吳萸五錢元明五錢為末空心酒下三錢出汗即愈又方小茴大茴各一兩豬尿胞一具入藥扎緊砂鍋內酒煮爛連胞搗丸梧子大空心下五十丸木子狐疝神方生花椒子四兩陳皮二兩青皮二兩荔枝核一百粒炒黃色硫磺二兩二錢五分用燒酒一斤將硫磺化開倒入燒酒內九次焙乾為末和前藥酒末湖為丸空心酒下三錢脫肛用融牛燒灰豬脂和敷立縮或以蔥湯薰洗五倍子末敷之熱鞋底托上或五倍子煎湯薰洗或以鱉頭燒灰香油調敷或用鮮蚌肉搗敷立止或薴麻根搗爛薰洗以礬五倍末敷之治腳粗如木桶用鳳仙花葉梗多多搗汁煎濃以筆塗之以消為度小便下血亂髮燒灰每服二錢以米湯入醋和服或以茅根車前湯下大便下血人發不拘多少先將磁罐一個裹外用姜擦三次將頭髮洗淨入內再用鐵燈盞蓋罐口以鹽和泥封頭周圍用火煆三炷香取出去火氣用五錢再用柏汗炒雞冠花各一兩為末每服二錢黃酒下又方槐花焙乾研細第服二錢空心白滾湯入白蜜糖數匙調服七日見效又方生荸齊吃十斤自愈又方槐花炒黑扁柏葉炒黑省陳棕灰各等分為末白湯調服便血荊芥穗二兩槐花一兩同炒紫色為末每服三錢清茶下又方何首烏忌鐵為末食前米飯我服二錢又木饅頭燒存性棕櫚皮燒存性烏梅去核粉草炙等分為末每服二錢水一盞煎服小便血茅根煎湯頻飲又方早蓮草車前草等分搗取自然汁空心服一杯又荷蒂七個燒灰酒服血淋用薴麻根搗湯頻服小便不通活田螺不拘多少清水養之將所吐泥留下逼去清水入膩粉五分鹽一匙麝香少許塗臍下良久即通又連須蔥白搗爛入蜜罨外腎上立通又萵苣子搗餅貼臍中婦人遺尿桑螵蛸搗炒為末薑湯服二錢小兒遺尿以新炊熱飯一盞傾尿訂處拌與食之勿令病者知又野薇根五錢酒翦夜夜飯諸淋白濁莖中痛欲死及小便不通者土牛滕不拘多少煎濃汁加麝香少許空心服又蔥七根鹽一撮熱水薰陰處即愈又葵花根二錢用野蜀葵更佳車前子一錢水煮飲水又扃竹草湯煎頻服大便不通芝麻細茶各一合細嚼滾水徐徐咽下或將二味搗爛白湯兩面三刀跳痛如刀割不可忍不紅腫者先用生薑切片蘇香油擦痛處隨用生薑火燒熱搗爛敷患處須臾姜乾痛止歷節風痛獨活姜活松節各等分酒煮空心服一杯筋骨疼痛刺薔薇根三錢五加皮木瓜當歸茯苓各二錢酒二盞煎一盞日服一次又方羌子産下蹄甲入罐內煆紅存性為末丐糊為丸梧子大每服三錢黃酒下不拘時一二次即愈寒濕氣痛鳳花蒼耳草俱連根帶葉搗爛煎湯洗腳氣上攻繩索成腫核白礬三兩煎水浸洗兩足良久自愈又方甘遂為末水調敷之內飲甘草湯即消腳氣疼痛每夜用監擦腳膝至足甲淹少時以熱湯泡洗又木瓜為末好酒調敷患處或以萆麻葉蒸搗裹之日二三易又神應膏廣膠三兩薑蔥各半斤搗汁另將陳酒糟取油一二兩或用米醋一碗和陳糟春細絹濾取汁共熬成膏布攤貼之立刻止痛消腫腿轉筋木瓜吳萸各一錢食鹽五分水二盞煎一盞服
